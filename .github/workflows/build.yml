name: Build ReVanced Patches dari GitLab

on:
  workflow_dispatch: # Memungkinkan Anda menekan tombol "Run workflow" secara manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Setup Java 17 (Syarat wajib kompilasi ReVanced)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 2. Clone (Unduh) langsung dari GitLab ReVanced
      - name: Clone dari GitLab ReVanced
        run: git clone https://gitlab.com/ReVanced/revanced-patches.git .

      # 3. Jalankan proses Build/Kompilasi
      - name: Build file .rvp
        run: |
          chmod +x gradlew
          ./gradlew build -PgithubPackagesUsername=${{ github.actor }} -PgithubPackagesPassword=${{ secrets.GITHUB_TOKEN }}

      # 4. Cari file .rvp yang sudah jadi lalu pindahkan
      - name: Pindahkan file hasil build
        run: |
          mkdir release_files
          find app/build/outputs -name "*.rvp" -exec cp {} release_files/patches.rvp \;

      # 5. Rilis ke repositori GitHub Anda
      - name: Buat GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "latest"
          name: "Latest Patches"
          files: release_files/patches.rvp
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
